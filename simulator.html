<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>수익 시뮬레이터 — Bali Bridge</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"
      crossorigin
    />
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        font-family: 'Pretendard', system-ui, sans-serif;
        background: #f8fafc;
      }
      .sim-shell {
        display: flex;
        flex-direction: column;
        height: 100%;
        min-height: 100vh;
      }
      .sim-toolbar {
        flex-shrink: 0;
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 12px 16px;
        background: #fff;
        border-bottom: 1px solid #e5e7eb;
      }
      .sim-toolbar button {
        padding: 8px 16px;
        border-radius: 8px;
        border: 1px solid #d1d5db;
        background: #fff;
        cursor: pointer;
        font-weight: 600;
        font-size: 14px;
      }
      .sim-toolbar span {
        font-size: 14px;
        color: #6b7280;
      }
      .sim-frame-wrap {
        flex: 1;
        min-height: 0;
      }
      .sim-frame-wrap iframe {
        display: block;
        border: 0;
        width: 100%;
        height: 100%;
        min-height: calc(100vh - 53px);
      }
    </style>
  </head>
  <body>
    <div class="sim-shell">
      <div class="sim-toolbar">
        <button type="button" onclick="window.history.back()">⬅️ 돌아가기</button>
        <span>메인 시뮬레이터 섹션을 불러옵니다. Next.js 앱에서 연동 시 이 페이지를 교체할 수 있습니다.</span>
      </div>
      <div class="sim-frame-wrap">
        <iframe src="/index.html#simulator" title="발리 빌라 수익 시뮬레이터"></iframe>
      </div>
    </div>
  </body>
</html>
