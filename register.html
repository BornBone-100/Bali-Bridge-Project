<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>[Bali Bridge Partners] 신규 매물 등록</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"
      crossorigin
    />
  </head>
  <body style="background-color: #f8fafc; min-height: 100vh; margin: 0">
    <div
      id="register-lock"
      style="display: none; padding: 50px; text-align: center; font-family: 'Pretendard', sans-serif"
    >
      🔒 매물 등록은 로그인(에이전트/집주인) 후 이용 가능합니다.
    </div>

    <div
      id="register-root"
      style="
        background-color: #f8fafc;
        min-height: 100vh;
        padding: 48px;
        font-family: 'Pretendard', sans-serif;
      "
    >
      <button
        type="button"
        onclick="window.history.back()"
        style="
          margin-bottom: 24px;
          padding: 8px 16px;
          border-radius: 8px;
          border: 1px solid #d1d5db;
          background-color: #fff;
          cursor: pointer;
        "
      >
        ⬅️ 돌아가기
      </button>

      <div
        style="
          max-width: 600px;
          margin: 0 auto;
          background-color: #fff;
          padding: 40px;
          border-radius: 20px;
          box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        "
      >
        <h1 style="font-size: 24px; font-weight: 800; margin-bottom: 8px">🏠 신규 매물 등록</h1>
        <p style="color: #6b7280; margin-bottom: 32px">에이전트 및 호스트 전용 매물 등록 페이지입니다.</p>

        <form id="property-register-form" style="display: flex; flex-direction: column; gap: 20px">
          <div>
            <label style="display: block; font-size: 14px; font-weight: 600; margin-bottom: 8px">
              매물 이름 (Title)
            </label>
            <input
              type="text"
              name="title"
              required
              placeholder="예: Canggu Luxury Pool Villa"
              style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #d1d5db"
            />
          </div>

          <div>
            <label style="display: block; font-size: 14px; font-weight: 600; margin-bottom: 8px">
              지역 (Location)
            </label>
            <input
              type="text"
              name="location"
              required
              placeholder="예: Canggu, Bali"
              style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #d1d5db"
            />
          </div>

          <div style="display: flex; gap: 20px">
            <div style="flex: 1">
              <label style="display: block; font-size: 14px; font-weight: 600; margin-bottom: 8px">
                투자 금액 (USD)
              </label>
              <input
                type="number"
                name="price_usd"
                required
                placeholder="예: 500000"
                style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #d1d5db"
              />
            </div>
            <div style="flex: 1">
              <label style="display: block; font-size: 14px; font-weight: 600; margin-bottom: 8px">
                예상 수익률 (ROI %)
              </label>
              <input
                type="number"
                step="0.1"
                name="roi"
                required
                placeholder="예: 15.2"
                style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #d1d5db"
              />
            </div>
          </div>

          <div>
            <label style="display: block; font-size: 14px; font-weight: 600; margin-bottom: 8px">
              대표 이미지 URL
            </label>
            <input
              type="url"
              name="image_url"
              placeholder="https://..."
              style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #d1d5db"
            />
          </div>

          <div class="form-group" style="margin-top: 20px">
            <label>법률 증빙 서류 업로드 (PDF/JPG)</label>
            <input type="file" id="reg-document" accept=".pdf, .jpg, .png" style="width: 100%; padding: 10px" />
            <p style="font-size: 12px; color: #dc2626">
              * 서류를 업로드해야 관리자(Bali Bridge Partners)의 실사 인증을 받을 수 있습니다.
            </p>
          </div>

          <button
            type="submit"
            id="register-submit-btn"
            style="
              margin-top: 20px;
              width: 100%;
              padding: 16px;
              background-color: #059669;
              color: #fff;
              font-size: 16px;
              font-weight: bold;
              border: none;
              border-radius: 8px;
              cursor: pointer;
            "
          >
            🚀 매물 등록하기
          </button>
        </form>
      </div>
    </div>

    <script src="./js/supabase-browser-env.js"></script>
    <script type="module" src="./js/register.js"></script>
    <script src="/js/master-backend.js"></script>
  </body>
</html>
