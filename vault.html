<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>나의 투자 보관함 · 발리 에이전트</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"
      crossorigin
    />
    <link rel="stylesheet" href="./css/styles.css" />
    <!-- Supabase JS — supabaseClient.js보다 먼저 로드 -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  </head>
  <body>
    <div class="vault-page-wrap">
      <a class="vault-back" href="./dashboard.html">← 대시보드로</a>

      <div class="vault-container">
        <header class="vault-header">
          <h1 data-i18n="title_vault">나의 투자 보관함</h1>
          <p data-i18n="desc_vault">발리 투자 여정을 한곳에서 확인하세요.</p>
        </header>

        <section class="vault-card profile-summary" aria-labelledby="vault-profile-title">
          <div id="vault-profile-title" class="card-title">나의 투자 성향</div>
          <div class="profile-mini-info">
            <span class="badge">성장형 투자자</span>
            <p>울루와투 지역의 지가 상승을 기대하는 전략</p>
          </div>
        </section>

        <section class="vault-card vault-total-assets" id="total-assets-card" aria-label="총 포트폴리오 가치">
          <p class="vault-total-assets-label" data-i18n="total_portfolio">총 포트폴리오 가치</p>
          <h2 id="vault-total" class="vault-total-assets-value">$0</h2>
        </section>

        <section class="vault-card vault-sim-panel" aria-labelledby="vault-sim-section-title">
          <h2 id="vault-sim-section-title" class="vault-panel-title" style="margin-top: 0" data-i18n="sim_records">
            수익 시뮬레이션 기록
          </h2>
          <p class="vault-panel-lead">시나리오를 입력하고 저장하면 Supabase 보관함과 대시보드에 반영됩니다.</p>

          <div class="vault-sim-recorder" id="vault-sim-recorder">
            <div class="vault-sim-form-row">
              <label class="vault-sim-label" for="sim-title">시나리오 이름</label>
              <input class="vault-sim-input" type="text" id="sim-title" placeholder="예: 짱구 풀빌라 보수적 시나리오" />
            </div>
            <div class="vault-sim-form-row vault-sim-form-row--split">
              <div>
                <label class="vault-sim-label" for="sim-investment">총 투자 금액 (USD)</label>
                <input class="vault-sim-input" type="number" id="sim-investment" min="1" placeholder="500000" />
              </div>
              <div>
                <label class="vault-sim-label" for="sim-rent">예상 월 임대료 ($)</label>
                <input class="vault-sim-input" type="number" id="sim-rent" min="0" placeholder="6500" />
              </div>
              <div>
                <label class="vault-sim-label" for="sim-occupancy">예상 가동률 (%)</label>
                <input class="vault-sim-input" type="number" id="sim-occupancy" min="0" max="100" placeholder="75" />
              </div>
            </div>
            <div class="vault-sim-roi-box">
              <span class="vault-sim-roi-label">예상 연간 ROI</span>
              <strong class="vault-sim-roi-value" id="sim-roi">0.0%</strong>
            </div>
            <button type="button" id="vault-save-btn" class="save-btn vault-sim-save-btn">💾 시나리오 저장하기</button>
          </div>

          <div id="vault-sim-list" class="vault-sim-list-wrap" aria-live="polite">
            <p id="loading-msg" style="color: #6b7280; margin: 16px 0 0">데이터를 불러오는 중입니다...</p>
          </div>
        </section>
      </div>
    </div>

    <script src="/js/i18n.js"></script>
    <script src="./js/supabase-browser-env.js"></script>
    <script src="./js/supabaseClient.js"></script>
    <script src="/js/vault.js"></script>
  </body>
</html>
