<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>나의 투자 보관함 · 발리 에이전트</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"
      crossorigin
    />
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body>
    <div class="vault-page-wrap">
      <a class="vault-back" href="/dashboard.html">← 디렉토리로</a>

      <div class="vault-container">
        <header class="vault-header">
          <h1>나의 투자 보관함</h1>
          <p>김성준 님의 발리 투자 여정입니다.</p>
        </header>

        <!-- 1. 투자 성향 요약 카드 -->
        <section class="vault-card profile-summary" aria-labelledby="vault-profile-title">
          <div id="vault-profile-title" class="card-title">나의 투자 성향</div>
          <div class="profile-mini-info">
            <span class="badge">성장형 투자자</span>
            <p>울루와투 지역의 지가 상승을 기대하는 전략</p>
          </div>
        </section>

        <!-- 2. 탭 메뉴 (시뮬레이션 / 보고서 / 찜) -->
        <nav class="vault-tabs" role="tablist" aria-label="보관함 메뉴">
          <button
            type="button"
            class="tab-btn active"
            role="tab"
            aria-selected="true"
            data-tab="simulation"
            onclick="switchTab('simulation')"
          >
            시뮬레이션
          </button>
          <button
            type="button"
            class="tab-btn"
            role="tab"
            aria-selected="false"
            data-tab="reports"
            onclick="switchTab('reports')"
          >
            실사 보고서 <span id="reports-tab-count" class="count">0</span>
          </button>
          <button
            type="button"
            class="tab-btn"
            role="tab"
            aria-selected="false"
            data-tab="likes"
            onclick="switchTab('likes')"
          >
            관심 목록
          </button>
        </nav>

        <div id="vault-compare-strip" class="vault-compare-strip" hidden>
          <span id="vault-compare-count" class="vault-compare-count">비교함 0/3</span>
          <a class="vault-compare-link" href="/compare.html">비교함 열기</a>
        </div>

        <!-- 3. 콘텐츠 영역 -->
        <div
          id="vault-content"
          class="vault-content-area"
          role="tabpanel"
          aria-live="polite"
        ></div>
      </div>
    </div>

    <script src="/js/data.js"></script>
    <script src="/js/compare-logic.js"></script>
    <script src="/js/inspection-requests.js"></script>
    <script src="/js/vault-storage.js"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"
      crossorigin="anonymous"
    ></script>
    <script src="/js/report-radar-chart.js"></script>
    <script src="/js/report-main.js"></script>
    <script src="/js/vault.js"></script>
  </body>
</html>
