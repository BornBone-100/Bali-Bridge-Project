<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>실사 보고서 매물 선택 · Bali Bridge</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"
      crossorigin
    />
    <link rel="stylesheet" href="./css/styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  </head>
  <body class="dd-body">
    <div class="dd-report-container" style="max-width: 720px; margin: 0 auto; padding: 32px 20px">
      <header style="margin: 24px 0 32px">
        <p class="dd-kicker">Due Diligence</p>
        <h1 class="dd-title" style="font-size: 1.75rem">실사 보고서 — 매물 선택</h1>
        <p class="dd-sub" style="margin-top: 8px; color: #6b7280">
          열람할 매물을 선택하면 해당 실사 보고서(DD)로 이동합니다. 보고서가 등록되지 않은 매물은 안내가 표시됩니다.
        </p>
      </header>
      <div id="dd-select-list" aria-live="polite">
        <p style="color: #6b7280">매물 목록을 불러오는 중...</p>
      </div>
      <p style="margin-top: 24px; font-size: 14px; color: #9ca3af">
        대시보드 <a href="./dashboard.html#dash-reco-section" style="color: #059669">추천 매물</a>에서도 바로 DD로 이동할 수 있습니다.
      </p>
    </div>
    <script src="/js/supabase-browser-env.js"></script>
    <script src="/js/supabaseClient.js"></script>
    <script type="module" src="/js/dd-select.js"></script>
