<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>에이전트 워크스페이스</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"
      crossorigin
    />
    <link rel="stylesheet" href="./css/styles.css" />
  </head>
  <body class="admin-body">
    <div class="admin-page-wrap">
      <a class="admin-back" href="./dashboard.html">← 대시보드로</a>

      <div class="admin-container">
        <header class="admin-header">
          <h2>에이전트 워크스페이스</h2>
          <p id="admin-greeting">
            안녕하세요, 에이전트님! 할당된 실사 요청을 확인하세요.
          </p>
        </header>

        <section class="task-summary" aria-label="요청 상태 요약">
          <div class="task-card urgent">
            <span>대기 중인 요청</span>
            <strong id="task-pending-count">0</strong>
          </div>
          <div class="task-card">
            <span>진행 중</span>
            <strong id="task-progress-count">0</strong>
          </div>
          <div class="task-card">
            <span>작성 완료</span>
            <strong id="task-completed-count">0</strong>
          </div>
        </section>

        <h3 class="admin-section-title">실사 요청 리스트</h3>
        <div id="request-list" class="request-list" aria-live="polite"></div>
      </div>
    </div>

    <script src="./js/data.js"></script>
    <script src="./js/inspection-requests.js"></script>
    <script src="./js/agent-dashboard.js"></script>
  </body>
</html>
