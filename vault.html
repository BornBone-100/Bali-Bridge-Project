<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>나의 투자 보관함 · 발리 에이전트</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"
      crossorigin
    />
    <link rel="stylesheet" href="./css/styles.css" />
    <!-- Supabase JS — supabaseClient.js보다 먼저 로드 -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  </head>
  <body>
    <div class="vault-page-wrap">
      <a class="vault-back" href="./dashboard.html">← 대시보드로</a>

      <div class="vault-container">
        <header class="vault-header">
          <h1>나의 투자 보관함</h1>
          <p>발리 투자 여정을 한곳에서 확인하세요.</p>
        </header>

        <section class="vault-card profile-summary" aria-labelledby="vault-profile-title">
          <div id="vault-profile-title" class="card-title">나의 투자 성향</div>
          <div class="profile-mini-info">
            <span class="badge">성장형 투자자</span>
            <p>울루와투 지역의 지가 상승을 기대하는 전략</p>
          </div>
        </section>

        <section class="vault-card vault-total-assets" id="total-assets-card" aria-label="총 포트폴리오 가치">
          <p class="vault-total-assets-label">총 포트폴리오 가치</p>
          <h2 id="total-amount" class="vault-total-assets-value">$0</h2>
        </section>

        <section class="vault-card" aria-labelledby="vault-sim-section-title">
          <h2 id="vault-sim-section-title" class="vault-panel-title" style="margin-top: 0">수익 시뮬레이션 기록</h2>
          <p class="vault-panel-lead">Supabase에 저장된 시나리오를 불러옵니다.</p>
          <div id="simulation-list">
            <div id="loading-msg">데이터를 불러오는 중입니다...</div>
          </div>
        </section>
      </div>
    </div>

    <script src="./js/supabase-browser-env.js"></script>
    <script src="./js/supabaseClient.js"></script>
    <script src="./js/vault.js"></script>
  </body>
</html>
