<!DOCTYPE html>
<html lang="ko" data-i18n-title="explore_doc_title">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>[Bali Bridge] 신규 매물 탐색</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"
      crossorigin
    />
    <link rel="stylesheet" href="./css/styles.css" />
  </head>
  <body class="bbdash-body">
    <div class="bbdash-wrapper">
      <aside class="bbdash-sidebar" aria-label="메인 내비게이션">
        <div class="bbdash-brand">
          <div class="bbdash-emblem" aria-hidden="true">
            <svg width="34" height="34" viewBox="0 0 48 48" fill="none">
              <path
                d="M24 4C14.6 4 7 11.6 7 21c0 10.4 9.8 21.1 16 23 6.2-1.9 16-12.6 16-23C39 11.6 33.4 4 24 4Z"
                stroke="rgba(255,255,255,0.65)"
                stroke-width="2.2"
              />
              <path
                d="M15.2 22.4c3.7-5.6 11.9-9 17.6-7.4-2.5 4.9-8.8 11.2-16.7 10.4"
                stroke="rgba(5,150,105,0.95)"
                stroke-width="2.2"
                stroke-linecap="round"
              />
            </svg>
          </div>
          <div>
            <p class="bbdash-brand-name">Bali Bridge</p>
            <p class="bbdash-brand-sub">Property Explorer</p>
          </div>
        </div>

        <nav class="bbdash-nav">
          <a id="nav-home" class="bbdash-link" data-i18n="nav_dashboard" href="./dashboard.html">대시보드 홈</a>
          <a id="nav-assets" class="bbdash-link" data-i18n="nav_vault" href="./vault.html">나의 투자 자산</a>
          <a id="nav-reports" class="bbdash-link" data-i18n="nav_dd" href="./dd-select.html">실사 보고서(DD)</a>
          <a id="nav-search" class="bbdash-link is-active" data-i18n="nav_explore" href="./property-explorer.html">신규 매물 탐색</a>
          <a id="nav-settings" class="bbdash-link" data-i18n="nav_settings" href="./agent-dashboard.html">설정(에이전트)</a>
        </nav>

        <div class="bbdash-sidebar-foot">
          <div class="bbdash-mini-emblem" aria-label="브랜드 엠블럼">
            <div class="bbdash-mini-dot"></div>
            <span>BB</span>
          </div>
          <a class="bbdash-sideback" data-i18n="dash_sideback" href="./index.html">← 홈으로</a>
        </div>
      </aside>

      <main class="bbdash-main ppex-main">
        <header class="ppex-header">
          <div class="ppex-header-top">
            <div class="ppex-header-copy">
              <h1 id="search-title" data-i18n="title_explore">신규 매물 탐색</h1>
              <p id="search-desc" data-i18n="desc_explore">
                Bali Bridge의 엄격한 실사(DD)를 거친 프리미엄 투자 자산을 확인하세요.
              </p>
              <p id="ppex-source-note" class="ppex-source-note" hidden aria-live="polite"></p>
            </div>
            <div class="ppex-lang-toggle" role="group" aria-label="Language">
              <button id="btn-kor" type="button" class="ppex-lang-btn" aria-pressed="true">KOR</button>
              <button id="btn-eng" type="button" class="ppex-lang-btn" aria-pressed="false">ENG</button>
            </div>
          </div>
        </header>

        <section class="ppex-filters" aria-label="고급 필터">
          <select id="filter-region">
            <option id="filter-all-label" value="all" data-i18n="filter_all">모든 지역</option>
            <option value="canggu">Canggu</option>
            <option value="uluwatu">Uluwatu</option>
            <option value="seminyak">Seminyak</option>
          </select>
          <select id="filter-roi">
            <option id="filter-roi-label" value="all" data-i18n="filter_roi">예상 수익률(ROI)</option>
            <option id="roi-high-label" value="high" data-i18n="roi_high">14% 이상</option>
            <option id="roi-mid-label" value="mid" data-i18n="roi_mid">12% ~ 13.9%</option>
            <option id="roi-low-label" value="low" data-i18n="roi_low">12% 미만</option>
          </select>
          <select id="filter-budget">
            <option id="filter-price-label" value="all" data-i18n="filter_price">투자 금액대</option>
            <option id="budget-lt700-label" value="lt700" data-i18n="budget_lt700">$700k 미만</option>
            <option id="budget-700to1000-label" value="700to1000" data-i18n="budget_700to1000">$700k ~ $1M</option>
            <option id="budget-gt1000-label" value="gt1000" data-i18n="budget_gt1000">$1M 이상</option>
          </select>
          <select id="filter-dd">
            <option id="filter-dd-label" value="all" data-i18n="filter_dd">실사 상태</option>
            <option id="dd-done-label" value="done" data-i18n="dd_done">실사 완료/법률 검토 완료</option>
            <option id="dd-progress-label" value="progress" data-i18n="dd_progress">진행 중</option>
            <option id="dd-scheduled-label" value="scheduled" data-i18n="dd_scheduled">실사 예정</option>
          </select>
          <button id="apply-filter" type="button" data-i18n="btn_apply">검색 적용</button>
        </section>

        <section id="explore-list" class="ppex-grid" aria-live="polite"></section>
      </main>
    </div>

    <script src="./js/i18n.js"></script>
    <script src="./js/translations.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./js/supabase-browser-env.js"></script>
    <script src="./js/supabaseClient.js"></script>
    <script type="module" src="./js/property-explorer.js"></script>
  </body>
</html>
